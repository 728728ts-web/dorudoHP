<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorudo Server Hp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #4a90e2;
            --text-color: #e0e0e0;
            --sub-text: #b0b0b0;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1e3a5f 0%, #4a90e2 100%);
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 800px;
            margin: -40px auto 40px;
            padding: 0 20px;
        }

        .box {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s ease;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        h3 {
            margin-top: 0;
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .box p {
            color: var(--sub-text);
            margin-bottom: 0;
        }

        .link-box {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .badge {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.9rem;
            color: #666;
        }

        /* スマホ対応 */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .container { margin-top: -20px; }
        }
    </style>
</head>

<body>

<header>
    <h1>Dorudo Server</h1>
    <p style="opacity: 0.8;">ドルド鯖 公式ホームページ</p>
</header>

<div class="container">

    <div class="box">
        <h3>News / 最新情報</h3>
        <div style="margin-bottom: 10px;">
            <span class="badge">Update</span> <small>2026/03/04</small>
            <p style="color: var(--text-color); margin-top: 5px;">サーバーアップデート実施！新ワールドの追加とイベントを予定しています。</p>
        </div>
    </div>

    <a href="https://forms.gle/あなたのフォームURL" target="_blank" class="link-box">
        <div class="box">
            <h3>Call for Creators / 製作者募集</h3>
            <p>あなたの技術でサーバーを盛り上げませんか？建築・運営メンバーを随時募集しています。</p>
            <p style="color: var(--accent-color); font-weight: bold; margin-top: 10px;">→ 応募フォームへ移動</p>
        </div>
    </a>

    <a href="https://あなたの既存サイトURL" target="_blank" class="link-box">
        <div class="box">
            <h3>Your Opinion / ご意見</h3>
            <p>より良いサーバー作りのため、皆様の声をお聞かせください。</p>
        </div>
    </a>

</div>

<footer>
    ©naninuCreate and dorudo2283
</footer>

</body>
</html>
